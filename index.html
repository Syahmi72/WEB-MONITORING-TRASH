<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITK Smart Waste Monitoring</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <!-- TAMBAHAN: Library Firebase Auth -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <style>
        /* ================= DEKORASI DASAR ================= */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; background-color: #f7faeb; min-height: 100vh; color: #333; }
        
        /* ================= SIDEBAR (DESKTOP) ================= */
        .sidebar { width: 260px; background-color: #272a27; color: white; padding: 30px 20px; display: flex; flex-direction: column; transition: 0.3s; }
        .brand { font-size: 22px; font-weight: bold; margin-bottom: 40px; }
        .brand span { color: #dcf5b8; }
        .nav-menu { list-style: none; }
        .nav-item { padding: 15px; border-radius: 12px; cursor: pointer; color: #a0a5a0; margin-bottom: 5px; transition: 0.3s; }
        .nav-item.active { background-color: #dcf5b8; color: #272a27; font-weight: 600; }
        .nav-item.logout-btn { color: #ff6b6b; margin-top: auto; border: 1px solid #ff6b6b; text-align: center; } /* Gaya tombol logout sidebar */
        .nav-item.logout-btn:hover { background-color: #ff6b6b; color: white; }
        
        /* ================= KONTEN UTAMA ================= */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        
        /* SUMMARY CARDS */
        .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border-bottom: 4px solid transparent; }
        .card.logam { border-color: #ffd166; }
        .card.plastik { border-color: #4db8ff; }
        .card.organik { border-color: #2ecc71; }
        .card h4 { color: #888; font-size: 12px; text-transform: uppercase; margin-bottom: 10px; }
        .card h2 { font-size: 24px; color: #272a27; }
        .card .unit { font-size: 14px; color: #aaa; font-weight: normal; }

        /* LIVE MONITORING */
        .status-container { background: white; padding: 25px; border-radius: 20px; margin-bottom: 30px; border-left: 8px solid #dcf5b8; }
        .status-container h3 { color: #555; margin-bottom: 15px; font-size: 16px; }
        .live-indicator { display: inline-flex; align-items: center; gap: 10px; font-weight: bold; font-size: 18px; padding: 12px 24px; background: #f0f0f0; border-radius: 12px; width: 100%; justify-content: center; transition: 0.3s; }
        .active-sort { animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* ================= RESPONSIVE (MOBILE) ================= */
        @media (max-width: 768px) {
            body { flex-direction: column; } 
            
            .sidebar { width: 100%; padding: 20px; height: auto; }
            .brand { margin-bottom: 0; text-align: center; }
            .nav-menu { display: none; } 
            
            .main-content { padding: 20px; }
            
            .header h2 { font-size: 20px; width: 100%; text-align: center; }
            .user-tag { width: 100%; text-align: center; display: flex; flex-direction: column; gap: 10px; }
            
            .summary-grid { grid-template-columns: 1fr; } 
            
            .card h2 { font-size: 22px; }
        }

        .btn-logout-mobile { display: none; background-color: #ff6b6b; color: white; border: none; padding: 5px 15px; border-radius: 15px; cursor: pointer; font-size: 12px; font-weight: bold; }
        @media (max-width: 768px) { .btn-logout-mobile { display: inline-block; } }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand">ITK <span>SmartWaste</span></div>
        <ul class="nav-menu" style="height: 100%; display: flex; flex-direction: column;">
            <li class="nav-item active">Dashboard</li>
            <li class="nav-item">Statistik</li>
            <li class="nav-item">Sistem</li>
            <!-- Tombol Logout Sidebar -->
            <li class="nav-item logout-btn" onclick="logoutDashboard()">Keluar (Logout)</li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="header">
            <h2>Monitoring Sistem Pemilah</h2>
            <div class="user-tag" style="background: white; padding: 10px 20px; border-radius: 30px; font-size: 13px; color: #666; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
                <strong>Sami Philip</strong> | ITK Balikpapan
                <!-- Tombol Logout Khusus Layar HP -->
                <button class="btn-logout-mobile" onclick="logoutDashboard()">Logout</button>
            </div>
        </div>

        <!-- TOTAL COUNTERS -->
        <div class="summary-grid">
            <div class="card logam">
                <h4>Total Logam</h4>
                <h2 id="total-logam">0 <span class="unit">item</span></h2>
            </div>
            <div class="card plastik">
                <h4>Total Plastik</h4>
                <h2 id="total-plastik">0 <span class="unit">item</span></h2>
            </div>
            <div class="card organik">
                <h4>Total Organik</h4>
                <h2 id="total-organik">0 <span class="unit">item</span></h2>
            </div>
        </div>

        <!-- LIVE MONITORING -->
        <div class="status-container">
            <h3>Deteksi Sensor Real-time:</h3>
            <div id="status-live" class="live-indicator">Menunggu Sampah...</div>
        </div>

        <!-- INFO BOX -->
        <div style="background: #2ecc71; color: white; padding: 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <p style="font-size: 12px; opacity: 0.9;">Koneksi Database</p>
                <h3 style="font-size: 18px;">Terhubung Online</h3>
            </div>
            <div style="font-size: 24px;">✅</div>
        </div>
    </main>

    <script>
        // Konfigurasi Lengkap Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDKlzNjFgaUwR3ehHq4upfANXVj0Mcc8Es",
            authDomain: "monitoring-tempat-sampah-c7e1a.firebaseapp.com",
            databaseURL: "https://monitoring-tempat-sampah-c7e1a-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "monitoring-tempat-sampah-c7e1a",
            storageBucket: "monitoring-tempat-sampah-c7e1a.firebasestorage.app",
            messagingSenderId: "41746176408",
            appId: "1:41746176408:web:f34430ca0c6a322f2433ed",
            measurementId: "G-P88X8D33M0"
        };

        // Inisialisasi Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        // ================= PENJAGA PINTU (AUTHENTICATION) =================
        firebase.auth().onAuthStateChanged((user) => {
            if (!user) {
                // Jika tidak ada user yang login, tendang ke halaman login
                window.location.replace("login.html");
            } else {
                console.log("User terverifikasi:", user.email);
            }
        });

        // Fungsi Logout
        function logoutDashboard() {
            firebase.auth().signOut().then(() => {
                window.location.replace("login.html");
            }).catch((error) => {
                alert("Gagal logout: " + error.message);
            });
        }
        // =================================================================

        const db = firebase.database();
        console.log("Sistem Web Monitoring Aktif. Menghubungkan ke Firebase...");

        // Fungsi Update Status Real-time
        db.ref('/sistem/status_aktif').on('value', (snapshot) => {
            const status = snapshot.val();
            const el = document.getElementById('status-live');
            
            if (status) {
                el.innerText = status;
                let statusText = status.toLowerCase(); 

                if (statusText.includes("logam")) {
                    el.style.backgroundColor = "#ffd166"; 
                    el.style.color = "#856404";
                    el.classList.add('active-sort');
                } 
                else if (statusText.includes("plastik")) {
                    el.style.backgroundColor = "#4db8ff"; 
                    el.style.color = "#004085";
                    el.classList.add('active-sort');
                }
                else if (statusText.includes("organik")) {
                    el.style.backgroundColor = "#2ecc71"; 
                    el.style.color = "#155724";
                    el.classList.add('active-sort');
                }
                else if (statusText === "standby" || statusText === "menunggu sampah...") {
                    el.style.backgroundColor = "#f0f0f0"; 
                    el.style.color = "#333";
                    el.classList.remove('active-sort');
                } 
                else {
                    el.style.backgroundColor = "#dcf5b8"; 
                    el.style.color = "#272a27";
                    el.classList.add('active-sort');
                }
            }
        });

        // Fungsi Update Total Counter
        db.ref('/sensor_induktif/total').on('value', (s) => {
            document.getElementById('total-logam').innerHTML = `${s.val() || 0} <span class="unit">item</span>`;
        });
        
        db.ref('/sensor_plastik/total').on('value', (s) => {
            document.getElementById('total-plastik').innerHTML = `${s.val() || 0} <span class="unit">item</span>`;
        });
        
        db.ref('/sensor_organik/total').on('value', (s) => {
            document.getElementById('total-organik').innerHTML = `${s.val() || 0} <span class="unit">item</span>`;
        });
    </script>
</body>
</html>
