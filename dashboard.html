<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ITK SmartWaste</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0c0a; color: white; font-family: 'Poppins'; padding: 20px; }
        .liquid-glass { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        #map { height: 300px; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="liquid-glass" style="text-align:center">
        <h2 id="status-live" style="color:#ccff00">Menunggu Sampah...</h2>
    </div>
    <div class="grid">
        <div class="liquid-glass"><h4>Logam</h4><h1 id="val-logam" style="color:#ccff00">0</h1></div>
        <div class="liquid-glass"><h4>Plastik</h4><h1 id="val-plastik" style="color:#4db8ff">0</h1></div>
        <div class="liquid-glass"><h4>Organik</h4><h1 id="val-organik" style="color:#2ecc71">0</h1></div>
    </div>
    <div class="liquid-glass"><div id="map"></div></div>
    <script>
        const config = { databaseURL: "https://monitoring-tempat-sampah-c7e1a-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(config);
        const db = firebase.database();
        const map = L.map('map').setView([-1.149, 116.899], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        const marker = L.marker([-1.149, 116.899]).addTo(map);
        db.ref('/sistem/status_aktif').on('value', s => document.getElementById('status-live').innerText = s.val());
        db.ref('/sensor_induktif/total').on('value', s => document.getElementById('val-logam').innerText = s.val());
        db.ref('/sensor_plastik/total').on('value', s => document.getElementById('val-plastik').innerText = s.val());
        db.ref('/sensor_organik/total').on('value', s => document.getElementById('val-organik').innerText = s.val());
        db.ref('/sistem/lokasi').on('value', s => { if(s.val()){ marker.setLatLng([s.val().lat, s.val().lng]); map.flyTo([s.val().lat, s.val().lng], 16); }});
    </script>
</body>
</html>
