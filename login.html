<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ITK SmartWaste</title>
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tambahan Library 3D Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        /* ================= DEKORASI DASAR ================= */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        html { background-color: #101210; } 

        body { 
            background: radial-gradient(circle at top left, #2b332b 0%, #101210 100%);
            background-color: #101210;
            background-attachment: fixed;
            color: #ffffff; 
            min-height: 100vh; 
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px; 
        }

        /* ================= BUNGKUSAN LOGIN (SPLIT SCREEN) ================= */
        .login-container {
            display: flex;
            width: 1000px;
            max-width: 100%;
            min-height: 550px;
            background: rgba(16, 18, 16, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* ================= KIRI: ILUSTRASI / BRANDING ================= */
        .login-left {
            flex: 1.2;
            background: linear-gradient(135deg, rgba(204, 255, 0, 0.05) 0%, rgba(0, 0, 0, 0) 100%);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        /* Efek Cahaya Neon di Belakang */
        .glowing-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            background: #ccff00;
            filter: blur(120px);
            opacity: 0.15;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            animation: pulseOrb 4s infinite alternate;
        }

        @keyframes pulseOrb { from { transform: translate(-50%, -50%) scale(1); } to { transform: translate(-50%, -50%) scale(1.1); opacity: 0.2; } }

        .brand-content { z-index: 1; display: flex; flex-direction: column; align-items: center; }
        
        /* WADAH UNTUK ANIMASI 3D (MENGGANTIKAN LOGO LAMA) */
        #logo-3d-container { 
            width: 180px; 
            height: 180px; 
            margin-bottom: 10px; 
            position: relative;
            /* Efek tatakan/podium tipis untuk 3D */
            background: radial-gradient(circle at bottom, rgba(204,255,0,0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .logo-text { font-size: 28px; font-weight: 700; letter-spacing: 1px; margin-bottom: 10px; }
        .logo-text span { color: #ccff00; }
        .brand-desc { color: #888; font-size: 14px; line-height: 1.6; max-width: 80%; margin: 0 auto; }

        /* ================= KANAN: FORM LOGIN ================= */
        .login-right {
            flex: 1;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: rgba(255, 255, 255, 0.02);
        }

        .login-right h2 { font-size: 32px; font-weight: 600; margin-bottom: 10px; }
        .login-right p { color: #888; font-size: 14px; margin-bottom: 40px; }

        .form-group { margin-bottom: 25px; }
        .form-label { display: block; font-size: 13px; color: #aaa; margin-bottom: 10px; font-weight: 500; }
        
        .form-input { 
            width: 100%; 
            background: rgba(0,0,0,0.3); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: #fff; 
            padding: 16px 20px; 
            border-radius: 12px; 
            font-size: 14px; 
            outline: none; 
            transition: 0.3s; 
        }
        .form-input:focus { border-color: #ccff00; background: rgba(204,255,0,0.02); box-shadow: 0 0 15px rgba(204,255,0,0.1); }
        
        .btn-login { 
            background: #ccff00; 
            color: #101210; 
            border: none; 
            padding: 16px; 
            border-radius: 12px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.3s; 
            width: 100%; 
            font-size: 16px; 
            margin-top: 10px;
        }
        .btn-login:hover { box-shadow: 0 0 20px rgba(204,255,0,0.4); transform: translateY(-2px); }

        #error-msg { 
            background: rgba(255, 71, 87, 0.1); 
            color: #ff4757; 
            padding: 12px; 
            border-radius: 8px; 
            font-size: 13px; 
            margin-top: 20px; 
            display: none; 
            border: 1px solid rgba(255, 71, 87, 0.3); 
            text-align: center;
        }

        /* ================= RESPONSIVE (KHUSUS HP) ================= */
        @media (max-width: 768px) {
            body { padding: 0; align-items: flex-start; } 
            .login-container { 
                flex-direction: column; 
                min-height: 100vh; 
                width: 100%; 
                border-radius: 0; 
                border: none; 
                box-shadow: none;
            }
            .login-left { padding: 40px 20px; border-right: none; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
            .login-right { padding: 40px 25px; flex: 1; justify-content: center; }
            .glowing-orb { width: 200px; height: 200px; }
            #logo-3d-container { width: 140px; height: 140px; } /* Diperkecil sedikit di HP */
        }
    </style>
</head>
<body>

    <div class="login-container">
        <!-- Bagian Kiri (Branding & Animasi 3D) -->
        <div class="login-left">
            <div class="glowing-orb"></div>
            <div class="brand-content">
                <!-- WADAH 3D REPLACEMENT LOGO -->
                <div id="logo-3d-container"></div>
                
                <div class="logo-text">ITK <span>SMARTWASTE</span></div>
                <p class="brand-desc">Sistem Monitoring Cerdas Pemilah Sampah Berbasis AI dan IoT Terintegrasi untuk Area Kampus ITK Balikpapan.</p>
            </div>
        </div>

        <!-- Bagian Kanan (Form) -->
        <div class="login-right">
            <h2>Welcome Back</h2>
            <p>Silakan masuk ke panel kontrol admin.</p>

            <form onsubmit="event.preventDefault(); prosesLogin();">
                <div class="form-group">
                    <label class="form-label">Email Admin</label>
                    <input type="email" id="email" class="form-input" placeholder="contoh: admin@itk.ac.id" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Masukkan password Anda" required>
                </div>

                <button type="submit" class="btn-login" id="btn-submit">Login ke Dashboard</button>
                <div id="error-msg">Email atau Password salah!</div>
            </form>
        </div>
    </div>

    <!-- Script Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <!-- SCRIPT 3D MINIATUR TONG SAMPAH -->
    <script>
        // 1. Inisialisasi Scene 3D di dalam kotak logo
        const container3D = document.getElementById('logo-3d-container');
        const scene = new THREE.Scene();
        
        // Kamera dibuat pas dengan ukuran kotak
        const camera = new THREE.PerspectiveCamera(50, container3D.clientWidth / container3D.clientHeight, 0.1, 100);
        camera.position.z = 12; // Jarak pandang
        camera.position.y = 2;
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container3D.clientWidth, container3D.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container3D.appendChild(renderer.domElement);

        // 2. Membuat Objek Smart Bin Mini
        const binGroup = new THREE.Group();

        // Badan Tong (Hitam Metalik)
        const bodyGeo = new THREE.CylinderGeometry(2.5, 2.2, 7, 32);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x1a1c1a, metalness: 0.8, roughness: 0.3 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        binGroup.add(body);

        // Kerangka Pemindai Neon (Wireframe Hijau)
        const wireMat = new THREE.MeshBasicMaterial({ color: 0xccff00, wireframe: true, transparent: true, opacity: 0.2 });
        const wireMesh = new THREE.Mesh(bodyGeo, wireMat);
        wireMesh.scale.set(1.03, 1.03, 1.03); 
        binGroup.add(wireMesh);

        // Cincin Sensor di atas
        const ringGeo = new THREE.TorusGeometry(2.6, 0.1, 8, 50);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0xccff00 });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.position.y = 3.5;
        ring.rotation.x = Math.PI / 2;
        binGroup.add(ring);

        scene.add(binGroup);

        // 3. Pencahayaan
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        
        const pointLight = new THREE.PointLight(0xccff00, 2, 50);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // 4. Animasi Berputar
        function animate3D() {
            requestAnimationFrame(animate3D);
            
            // Putar tong sampahnya
            binGroup.rotation.y += 0.015;
            
            // Efek cincin pemindai naik turun
            ring.position.y = 3.5 + Math.sin(Date.now() * 0.005) * 0.2;

            renderer.render(scene, camera);
        }
        animate3D();

        // Responsif jika layar berubah ukuran
        window.addEventListener('resize', () => {
            if(container3D) {
                camera.aspect = container3D.clientWidth / container3D.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container3D.clientWidth, container3D.clientHeight);
            }
        });
    </script>

    <!-- SCRIPT LOGIKA FIREBASE -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDKlzNjFgaUwR3ehHq4upfANXVj0Mcc8Es", 
            authDomain: "monitoring-tempat-sampah-c7e1a.firebaseapp.com",
            projectId: "monitoring-tempat-sampah-c7e1a",
            storageBucket: "monitoring-tempat-sampah-c7e1a.firebasestorage.app",
            messagingSenderId: "41746176408",
            appId: "1:41746176408:web:f34430ca0c6a322f2433ed"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const auth = firebase.auth();

        auth.onAuthStateChanged((user) => {
            if (user) {
                window.location.replace("/index.html");
            }
        });

        function prosesLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const btnSubmit = document.getElementById('btn-submit');

            btnSubmit.innerText = "Memverifikasi...";
            btnSubmit.style.opacity = "0.7";

            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    window.location.href = "/index.html";
                })
                .catch((error) => {
                    btnSubmit.innerText = "Login ke Dashboard";
                    btnSubmit.style.opacity = "1";
                    
                    errorMsg.style.display = "block";
                    if(error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                        errorMsg.innerText = "Data tidak cocok. Cek kembali email & password Anda.";
                    } else {
                        errorMsg.innerText = "Gagal login: " + error.message;
                    }
                });
        }
    </script>
</body>
</html>
